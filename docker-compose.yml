services:
  postgres:
    image: postgres:16-alpine
    container_name: mindful-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mindful_living
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mindful_living"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
